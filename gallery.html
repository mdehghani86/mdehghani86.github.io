<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Dr. Mohammad Dehghani</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neu-red: #C41230;
            --text-primary: #1a1a2e;
            --text-secondary: #64748b;
            --bg-light: #fafbfc;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-light);
            color: var(--text-primary);
            line-height: 1.7;
        }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--neu-red);
        }

        .back-link svg {
            width: 18px;
            height: 18px;
        }

        .page-tag {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--neu-red);
            background: #fef2f2;
            padding: 5px 12px;
            border-radius: 4px;
        }

        /* Page Content */
        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 30px 80px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 30px;
        }

        /* Filter Buttons */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 30px;
        }

        .filter-btn {
            padding: 7px 18px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: white;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .filter-btn:hover {
            border-color: var(--neu-red);
            color: var(--neu-red);
        }

        .filter-btn.active {
            background: var(--neu-red);
            border-color: var(--neu-red);
            color: white;
        }

        /* Masonry Grid */
        .gallery-grid {
            columns: 4 260px;
            column-gap: 12px;
        }

        .gallery-card {
            break-inside: avoid;
            margin-bottom: 12px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            background: white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .gallery-card img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease;
        }

        .gallery-card:hover img {
            transform: scale(1.03);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 40%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 16px;
        }

        .gallery-card:hover .card-overlay {
            opacity: 1;
        }

        .card-caption {
            color: white;
            font-size: 13px;
            font-weight: 500;
            line-height: 1.4;
        }

        .card-year {
            color: rgba(255,255,255,0.7);
            font-size: 11px;
            margin-top: 4px;
        }

        .card-category {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            color: white;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 3px 10px;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-card:hover .card-category {
            opacity: 1;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            position: relative;
            max-width: 90vw;
            max-height: 85vh;
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 8px;
            object-fit: contain;
        }

        .lightbox-caption {
            text-align: center;
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            margin-top: 16px;
            line-height: 1.5;
        }

        .lightbox-close {
            position: fixed;
            top: 20px;
            right: 25px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            padding: 8px;
            transition: color 0.2s;
        }

        .lightbox-close:hover {
            color: white;
        }

        .lightbox-close svg {
            width: 28px;
            height: 28px;
        }

        .lightbox-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            padding: 12px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .lightbox-nav:hover {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .lightbox-nav svg {
            width: 24px;
            height: 24px;
        }

        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }

        /* Empty state when filter has no results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            display: none;
        }

        .no-results svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .gallery-grid { columns: 3 180px; }
            .page-title { font-size: 1.6rem; }
        }

        @media (max-width: 600px) {
            .gallery-grid { columns: 2 140px; }
            .page { padding: 25px 16px 60px; }
            .card-overlay { opacity: 1; }
            .card-category { opacity: 1; }
            .lightbox { padding: 20px; }
            .lightbox-nav { display: none; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-container">
            <a href="index.html" class="back-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                Back to Home
            </a>
            <span class="page-tag">Gallery</span>
        </div>
    </div>

    <div class="page">
        <h1 class="page-title">Photo Gallery</h1>
        <p class="page-subtitle">Moments from conferences, campus life, teaching, and travels</p>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="event">Events & Conferences</button>
            <button class="filter-btn" data-filter="campus">Campus</button>
            <button class="filter-btn" data-filter="teaching">Teaching</button>
            <button class="filter-btn" data-filter="doc">Dialogue of Civilizations</button>
            <button class="filter-btn" data-filter="team">Team</button>
        </div>

        <div class="gallery-grid" id="galleryGrid"></div>

        <div class="no-results" id="noResults">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            <p>No photos in this category yet -more coming soon!</p>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
        </button>
        <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="lightbox-content">
            <img id="lbImage" src="" alt="">
            <div class="lightbox-caption" id="lbCaption"></div>
        </div>
        <button class="lightbox-nav lightbox-next" onclick="navLightbox(1)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
    </div>

    <script>
        var photos = [
            { src: "assets/images/gallery/event-mcdm-istanbul-2019.jpg", caption: "MCDM - Creative Decisions Foundation Award Recipients, Istanbul, Turkey", year: "2019", cat: "event" },
            { src: "assets/images/gallery/event-iise-best-paper-anaheim-2016.jpg", caption: "IISE Best Paper Award with Musa Demirtas & Dr. Steven Li, Anaheim, CA", year: "2016", cat: "event" },
            { src: "assets/images/gallery/event-wsc-best-paper-award-2015.jpg", caption: "WSC Best Ph.D. Student Paper Award, Huntington Beach, CA", year: "2015", cat: "event" },
            { src: "assets/images/gallery/event-informs-beach-2021.jpg", caption: "INFORMS Annual Meeting - Huntington Beach, California", year: "2021", cat: "event" },
            { src: "assets/images/gallery/event-informs-anaheim-2021.jpg", caption: "INFORMS - Anaheim Convention Center, with Dr. Javad Seif", year: "2021", cat: "event" },
            { src: "assets/images/gallery/event-leren-defense-2023.jpg", caption: "Leren Qian's Thesis Defense", year: "2023", cat: "event" },
            { src: "assets/images/gallery/event-eurosim-amsterdam-2023.jpg", caption: "EuroSim - With the Simulation Research Community, Amsterdam", year: "2023", cat: "event" },
            { src: "assets/images/gallery/event-galante-banquet-2023.jpg", caption: "Galante Banquet Event", year: "2023", cat: "event" },
            { src: "assets/images/gallery/event-tii-talk-abudhabi-2024.jpg", caption: "Invited Talk on Digital Twin & AI at Technology Innovation Institute (TII), Abu Dhabi", year: "2024", cat: "event" },
            { src: "assets/images/gallery/event-google-hq-mountain-view-2025.jpg", caption: "Visiting Google Headquarters, Mountain View, California", year: "2025", cat: "event" },
            { src: "assets/images/gallery/event-iise-conference-2026.jpg", caption: "MIE Department at IISE Annual Conference", year: "2026", cat: "event" },
            { src: "assets/images/gallery/campus-graduation-president-aoun-2021.jpg", caption: "Commencement with President Aoun, Northeastern University", year: "2021", cat: "campus" },
            { src: "assets/images/gallery/campus-fall-vibes-boston-2024.jpg", caption: "Fall Vibes - Northeastern Boston Campus", year: "2024", cat: "campus" },
            { src: "assets/images/gallery/teaching-rl-class-covid-2020.jpg", caption: "Reinforcement Learning Class - Online During COVID", year: "2020", cat: "teaching" },
            { src: "assets/images/gallery/doc-turkey-blue-mosque-2023.jpg", caption: "Dialogue of Civilizations - Blue Mosque, Istanbul", year: "2023", cat: "doc" },
            { src: "assets/images/gallery/doc-turkey-bosphorus-2023.jpg", caption: "Dialogue of Civilizations - By the Bosphorus, Istanbul", year: "2023", cat: "doc" },
            { src: "assets/images/gallery/doc-turkey-local-market-izmir-2023.jpg", caption: "Dialogue of Civilizations - Exploring Local Markets, Izmir", year: "2023", cat: "doc" },
            { src: "assets/images/gallery/doc-turkey-class-group-2023.jpg", caption: "Dialogue of Civilizations - Class Group Photo, Turkey", year: "2023", cat: "doc" },
            { src: "assets/images/gallery/event-wsc-huntington-beach-2015.jpg", caption: "WSC Conference - Huntington Beach, California", year: "2015", cat: "event" },
            { src: "assets/images/gallery/doc-turkey-ephesus-2022.jpg", caption: "Dialogue of Civilizations - Library of Celsus, Ephesus, Turkey", year: "2022", cat: "doc" },
            { src: "assets/images/gallery/teaching-rl-wonderland-robots.jpg", caption: "RL Wonderland - Robot Designs for Applied Reinforcement Learning Course", year: "2024", cat: "teaching" },
            { src: "assets/images/gallery/team-birthday-ashwin-emily.jpg", caption: "Birthday Celebration with Ashwin Devanga and Emily Diaz Badilla", year: "2023", cat: "team" },
            { src: "assets/images/gallery/event-bertsimas-visit.jpg", caption: "Dr. Dimitris Bertsimas Visit to Northeastern", year: "2018", cat: "event" },
            { src: "assets/images/gallery/team-students-northeastern-campus.jpg", caption: "Students on the Northeastern Boston Campus", year: "2024", cat: "team" }
        ];

        // Sort by year descending
        photos.sort(function(a, b) { return parseInt(b.year) - parseInt(a.year); });

        var currentFilter = 'all';
        var currentIndex = 0;
        var visiblePhotos = photos;

        function renderGallery() {
            var grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            visiblePhotos = currentFilter === 'all' ? photos : photos.filter(function(p) { return p.cat === currentFilter; });

            document.getElementById('noResults').style.display = visiblePhotos.length === 0 ? 'block' : 'none';

            visiblePhotos.forEach(function(photo, i) {
                var card = document.createElement('div');
                card.className = 'gallery-card';
                card.onclick = function() { openLightbox(i); };
                var catLabel = photo.cat.charAt(0).toUpperCase() + photo.cat.slice(1);
                card.innerHTML = '<img loading="lazy" decoding="async" src="' + photo.src + '" alt="' + photo.caption + '">' +
                    '<div class="card-category">' + catLabel + '</div>' +
                    '<div class="card-overlay">' +
                    '<span class="card-caption">' + photo.caption + '</span>' +
                    '<span class="card-year">' + photo.year + '</span>' +
                    '</div>';
                grid.appendChild(card);
            });
        }

        // Filters
        document.querySelectorAll('.filter-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderGallery();
            });
        });

        // Lightbox
        function openLightbox(index) {
            currentIndex = index;
            var photo = visiblePhotos[index];
            document.getElementById('lbImage').src = photo.src;
            document.getElementById('lbImage').alt = photo.caption;
            document.getElementById('lbCaption').textContent = photo.caption + ' -' + photo.year;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        function navLightbox(dir) {
            currentIndex = (currentIndex + dir + visiblePhotos.length) % visiblePhotos.length;
            var photo = visiblePhotos[currentIndex];
            document.getElementById('lbImage').src = photo.src;
            document.getElementById('lbImage').alt = photo.caption;
            document.getElementById('lbCaption').textContent = photo.caption + ' -' + photo.year;
        }

        // Keyboard nav
        document.addEventListener('keydown', function(e) {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navLightbox(-1);
            if (e.key === 'ArrowRight') navLightbox(1);
        });

        // Click outside to close
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });

        // Initial render
        renderGallery();
    </script>
</body>
</html>
